name: Go

on:
  push:
    branches: ["main"]
    tags: ["v*"]

  pull_request:
    branches: ["main"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: lightcode-linux-amd64

          - goos: linux
            goarch: arm64
            binary: lightcode-linux-arm64

          - goos: darwin
            goarch: amd64
            binary: lightcode-darwin-amd64

          - goos: darwin
            goarch: arm64
            binary: lightcode-darwin-arm64

          - goos: windows
            goarch: amd64
            binary: lightcode-windows-amd64.exe

          - goos: windows
            goarch: arm64
            binary: lightcode-windows-arm64.exe

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Create dist directory
        run: mkdir -p dist

      - name: Build
        run: |
          GOOS=${{ matrix.goos }} \
          GOARCH=${{ matrix.goarch }} \
          go build -v -o dist/${{ matrix.binary }} ./cmd/lightcode

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}

  release:
    needs: build

    if: startsWith(github.ref, 'refs/tags/')

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Flatten files
        run: |
          mkdir -p release
          find dist -type f -exec mv {} release/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*