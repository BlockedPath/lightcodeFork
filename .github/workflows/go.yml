name: Go

on:
  push:
    branches: ["main"]
    tags: ["v*"]

  pull_request:
    branches: ["main"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            binary: lightcode-linux-amd64

          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            binary: lightcode-linux-arm64

          - goos: darwin
            goarch: amd64
            runner: macos-13
            binary: lightcode-darwin-amd64

          - goos: darwin
            goarch: arm64
            runner: macos-latest
            binary: lightcode-darwin-arm64

          - goos: windows
            goarch: amd64
            runner: windows-latest
            binary: lightcode-windows-amd64.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Create dist directory
        run: mkdir -p dist

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          libx11-dev \
          libxkbcommon-dev \
          xorg-dev

      - name: Build
        run: go build -v -o dist/${{ matrix.binary }} ./cmd/lightcode
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}

  release:
    needs: build

    if: startsWith(github.ref, 'refs/tags/')

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Flatten files
        run: |
          mkdir -p release
          find dist -type f -exec mv {} release/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*